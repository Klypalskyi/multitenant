name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # v6+ runs the action on Node 24 (avoids deprecated Node 20 action runtime after GH runner updates)
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Test coverage (thresholds)
        run: npm run test:coverage

      - name: Example smoke (root tenants.config)
        run: npm run examples:smoke

      - name: Express minimal (supertest)
        run: npm run examples:express-smoke
