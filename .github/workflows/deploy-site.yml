# Deploy Nextra site to Vercel. Alternative: connect the repo in the Vercel dashboard
# (Root Directory: apps/site) and rely on Git-triggered builds — same vercel.json.
#
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (Vercel → Project Settings → General, or .vercel/project.json after `vercel link`.)
name: Deploy site

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/site/**'
      - 'package-lock.json'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vercel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/site
          vercel-args: '--prod'
